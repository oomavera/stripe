<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Create Owner Password — Sunday Sessions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --blue:#1747d1; --charcoal:#2b2c30; --muted:#686a70; --line:#dedfe2; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:#fff; color:var(--charcoal); font-family:Inter,sans-serif; }
    main { width:min(440px,100%); }
    .brand { margin-bottom:50px; color:var(--blue); font:400 1.15rem Anton,sans-serif; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:0 0 8px; font:400 clamp(2.8rem,12vw,4.6rem)/.94 Anton,sans-serif; text-transform:uppercase; }
    .intro { margin:0 0 26px; color:var(--muted); font-size:.84rem; line-height:1.5; }
    form { padding:24px; border:1px solid var(--line); }
    label { display:block; margin:0 0 7px; color:var(--muted); font-size:.67rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
    input { width:100%; height:46px; margin-bottom:14px; padding:0 12px; border:1px solid var(--line); border-radius:0; color:var(--charcoal); font:400 .82rem Inter,sans-serif; }
    input:focus { outline:3px solid rgb(43 44 48 / 10%); border-color:var(--charcoal); }
    button { width:100%; height:44px; border:0; background:var(--charcoal); color:#fff; cursor:pointer; font:400 .88rem Anton,sans-serif; letter-spacing:.06em; text-transform:uppercase; }
    button:disabled { opacity:.55; cursor:wait; }
    .message { min-height:19px; margin:13px 0 0; color:#8b2e2e; font-size:.75rem; line-height:1.45; }
    .success { color:var(--charcoal); font-weight:600; }
    a { color:var(--charcoal); }
  </style>
</head>
<body>
  <main>
    <div class="brand">Sunday Sessions</div>
    <h1>Create your password</h1>
    <p class="intro">Choose the password you’ll use for your private owner portal.</p>

    <form id="password-form">
      <label for="password">New password</label>
      <input id="password" type="password" minlength="10" autocomplete="new-password" required>
      <label for="confirmation">Confirm password</label>
      <input id="confirmation" type="password" minlength="10" autocomplete="new-password" required>
      <button type="submit">Save password</button>
      <p class="message" id="message" role="status"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#password-form");
    const message = document.querySelector("#message");
    const params = new URLSearchParams(location.hash.slice(1));
    const accessToken = params.get("access_token");

    if (!accessToken) {
      message.innerHTML = 'This invitation link is invalid or has expired. Request a new invitation.';
      form.querySelector("button").disabled = true;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = document.querySelector("#password").value;
      const confirmation = document.querySelector("#confirmation").value;
      const button = form.querySelector("button");

      if (password !== confirmation) {
        message.textContent = "The passwords do not match.";
        return;
      }

      button.disabled = true;
      button.textContent = "Saving...";
      message.textContent = "";

      try {
        const configResponse = await fetch("/api/admin-config", { cache: "no-store" });
        if (!configResponse.ok) throw new Error("Portal configuration is unavailable.");
        const { url, publishableKey } = await configResponse.json();

        const response = await fetch(`${url}/auth/v1/user`, {
          method: "PUT",
          headers: {
            apikey: publishableKey,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password })
        });

        if (!response.ok) {
          const result = await response.json().catch(() => ({}));
          throw new Error(result.message || "This invitation has expired.");
        }

        form.reset();
        message.classList.add("success");
        message.innerHTML = 'Password saved. <a href="/owner">Open your owner portal</a>.';
        button.textContent = "Password saved";
      } catch (error) {
        message.textContent = error.message || "Could not save your password.";
        button.disabled = false;
        button.textContent = "Save password";
      }
    });
  </script>
</body>
</html>
