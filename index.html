<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sunday Sessions dance class booking confirmation.">
  <title>Thank You — Sunday Sessions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1747d1;
      --charcoal: #2b2c30;
      --white: #fff;
      --muted: #686a70;
      --line: #dedfe2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--white);
      color: var(--charcoal);
      font-family: "Inter", sans-serif;
    }

    .page {
      width: min(1080px, 100%);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
    }

    .hero,
    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(32px, 5vw, 68px);
    }

    .hero {
      border-right: 1px solid var(--line);
    }

    .brand {
      position: absolute;
      top: 36px;
      display: flex;
      align-items: center;
      color: var(--blue);
      font-family: "Anton", sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.69rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: "Anton", sans-serif;
      font-weight: 400;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(4.2rem, 8vw, 7rem);
      line-height: 0.88;
      letter-spacing: -0.02em;
    }

    .hero-copy {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    h2 {
      font-size: clamp(2.7rem, 5vw, 4rem);
      line-height: 0.94;
    }

    .class-details {
      margin: 24px 0 28px;
      border-top: 1px solid var(--line);
    }

    .detail {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
    }

    .detail dt {
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .detail dd {
      margin: 0;
      font-size: 0.84rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .signup {
      padding: 20px;
      border: 1px solid var(--line);
    }

    .signup h3 {
      font-size: 1.4rem;
    }

    .signup > p {
      margin: 5px 0 15px;
      color: var(--muted);
      font-size: 0.74rem;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    input,
    button {
      width: 100%;
      height: 44px;
      border-radius: 0;
      font-family: "Inter", sans-serif;
    }

    input {
      padding: 0 12px;
      border: 1px solid var(--line);
      outline: none;
      color: var(--charcoal);
      font-size: 0.76rem;
    }

    input:focus {
      border-color: var(--charcoal);
      box-shadow: 0 0 0 3px rgb(21 23 28 / 9%);
    }

    button {
      margin-top: 8px;
      border: 0;
      background: var(--charcoal);
      color: var(--white);
      cursor: pointer;
      font-family: "Anton", sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    button:hover { background: #3a3b40; }

    .success-message {
      display: none;
      color: var(--charcoal) !important;
      font-weight: 600;
    }

    .success-message.visible { display: block; }

    @media (max-width: 720px) {
      body { display: block; }

      .page {
        display: block;
        min-height: auto;
      }

      .hero,
      .content {
        padding: 24px;
      }

      .hero {
        min-height: 245px;
        padding-top: 84px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        top: 24px;
      }

      h1 {
        font-size: clamp(4rem, 20vw, 5.5rem);
      }

      .content {
        justify-content: flex-start;
      }

      h2 {
        font-size: 2.45rem;
      }

      .class-details {
        margin: 17px 0 20px;
      }
    }

    @media (max-width: 420px) {
      .hero {
        min-height: 222px;
        padding-top: 75px;
      }

      .hero-copy { margin-top: 14px; }
      .fields { grid-template-columns: 1fr; }
      .detail { padding: 10px 0; }
      .signup { padding: 16px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="thank-you-title">
      <div class="brand">Sunday Sessions</div>
      <p class="eyebrow">Your spot is saved</p>
      <h1 id="thank-you-title">Thank you!</h1>
      <p class="hero-copy">No need to look for a confirmation email.</p>
    </section>

    <section class="content" aria-labelledby="class-title">
      <h2 id="class-title">See you at the mirror</h2>

      <dl class="class-details">
        <div class="detail"><dt>Day</dt><dd>July 25th</dd></div>
        <div class="detail"><dt>Time</dt><dd>5:30–7:00 PM</dd></div>
        <div class="detail"><dt>Location</dt><dd>Momentum Dance Complex</dd></div>
      </dl>

      <form class="signup" id="updates-form">
        <h3>Catch the next session</h3>
        <p>Get updates on the next pop-up.</p>
        <div class="fields">
          <div>
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" required>
          </div>
          <div>
            <label for="phone">Phone number</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="Phone number" required>
          </div>
        </div>
        <button type="submit">Keep me in the loop</button>
        <p class="success-message" id="success-message" role="status">You’re on the list!</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.querySelector("#updates-form");
    const successMessage = document.querySelector("#success-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const button = form.querySelector("button");
      button.textContent = "You're on the list";
      button.disabled = true;
      successMessage.classList.add("visible");
      form.reset();
    });
  </script>
</body>
</html>
