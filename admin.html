<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Sunday Sessions — Owner Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --blue:#1747d1; --charcoal:#2b2c30; --muted:#686a70; --line:#dedfe2; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:#fff; color:var(--charcoal); font-family:Inter,sans-serif; }
    main { width:min(1050px, calc(100% - 40px)); margin:0 auto; padding:42px 0; }
    header { display:flex; justify-content:space-between; align-items:center; gap:20px; padding-bottom:26px; border-bottom:1px solid var(--line); }
    .brand { color:var(--blue); font:400 1.2rem Anton,sans-serif; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:36px 0 8px; font:400 clamp(2.7rem,7vw,5rem)/.95 Anton,sans-serif; text-transform:uppercase; }
    .intro { margin:0 0 30px; color:var(--muted); font-size:.86rem; }
    .card { max-width:440px; padding:24px; border:1px solid var(--line); }
    label { display:block; margin:0 0 7px; color:var(--muted); font-size:.68rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
    input { width:100%; height:46px; margin-bottom:14px; padding:0 12px; border:1px solid var(--line); border-radius:0; font:400 .82rem Inter,sans-serif; }
    input:focus { outline:3px solid rgb(43 44 48 / 10%); border-color:var(--charcoal); }
    button { min-height:43px; padding:0 20px; border:0; background:var(--charcoal); color:#fff; cursor:pointer; font:400 .85rem Anton,sans-serif; letter-spacing:.06em; text-transform:uppercase; }
    button:disabled { opacity:.55; cursor:wait; }
    .error { min-height:18px; margin:12px 0 0; color:#8b2e2e; font-size:.76rem; }
    .portal { display:none; }
    .portal.visible { display:block; }
    .login.hidden { display:none; }
    .toolbar { display:flex; justify-content:space-between; align-items:end; gap:20px; margin:36px 0 16px; }
    .count { color:var(--muted); font-size:.78rem; }
    .table-wrap { overflow:auto; border:1px solid var(--line); }
    table { width:100%; border-collapse:collapse; text-align:left; }
    th,td { padding:13px 15px; border-bottom:1px solid var(--line); white-space:nowrap; font-size:.8rem; }
    th { color:var(--muted); font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; }
    tr:last-child td { border-bottom:0; }
    #logout { background:#fff; color:var(--charcoal); border:1px solid var(--line); }
    @media(max-width:600px) { main{width:min(100% - 28px,1050px);padding:24px 0;} header{padding-bottom:20px;} .toolbar{align-items:flex-start;flex-direction:column;} }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">Sunday Sessions</div>
      <button id="logout" type="button" hidden>Sign out</button>
    </header>

    <section class="login" id="login-section">
      <h1>Owner portal</h1>
      <p class="intro">Sign in with your authorized Supabase account.</p>
      <form class="card" id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>
        <button type="submit">Sign in</button>
        <p class="error" id="login-error" role="alert"></p>
      </form>
    </section>

    <section class="portal" id="portal-section">
      <div class="toolbar">
        <div>
          <h1>Class updates</h1>
          <div class="count" id="subscriber-count"></div>
        </div>
        <button type="button" id="refresh">Refresh</button>
      </div>
      <p class="error" id="portal-error" role="alert"></p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Email</th><th>Phone</th><th>Joined</th></tr></thead>
          <tbody id="subscriber-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const loginSection = document.querySelector("#login-section");
    const portalSection = document.querySelector("#portal-section");
    const loginForm = document.querySelector("#login-form");
    const loginError = document.querySelector("#login-error");
    const portalError = document.querySelector("#portal-error");
    const logoutButton = document.querySelector("#logout");
    const rows = document.querySelector("#subscriber-rows");
    const count = document.querySelector("#subscriber-count");
    let config;
    let accessToken = sessionStorage.getItem("sunday-sessions-admin-token");

    async function getConfig() {
      if (config) return config;
      const response = await fetch("/api/admin-config", { cache: "no-store" });
      if (!response.ok) throw new Error("Owner portal is not configured yet.");
      config = await response.json();
      return config;
    }

    function showLogin(message = "") {
      accessToken = null;
      sessionStorage.removeItem("sunday-sessions-admin-token");
      loginSection.classList.remove("hidden");
      portalSection.classList.remove("visible");
      logoutButton.hidden = true;
      loginError.textContent = message;
    }

    function showPortal() {
      loginSection.classList.add("hidden");
      portalSection.classList.add("visible");
      logoutButton.hidden = false;
    }

    function cell(value) {
      const td = document.createElement("td");
      td.textContent = value;
      return td;
    }

    async function loadSubscribers() {
      portalError.textContent = "";
      const response = await fetch("/api/subscribers", {
        cache: "no-store",
        headers: { Authorization: `Bearer ${accessToken}` }
      });

      if (response.status === 401 || response.status === 403) {
        showLogin("Please sign in with the authorized owner account.");
        return;
      }
      if (!response.ok) throw new Error("Could not load subscribers.");

      const { subscribers } = await response.json();
      rows.replaceChildren();
      subscribers.forEach((subscriber) => {
        const tr = document.createElement("tr");
        tr.append(
          cell(subscriber.email),
          cell(subscriber.phone),
          cell(new Date(subscriber.created_at).toLocaleString())
        );
        rows.append(tr);
      });
      count.textContent = `${subscribers.length} subscriber${subscribers.length === 1 ? "" : "s"}`;
      showPortal();
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = loginForm.querySelector("button");
      button.disabled = true;
      loginError.textContent = "";

      try {
        const { url, publishableKey } = await getConfig();
        const response = await fetch(`${url}/auth/v1/token?grant_type=password`, {
          method: "POST",
          headers: { apikey: publishableKey, "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.querySelector("#email").value.trim(),
            password: document.querySelector("#password").value
          })
        });
        if (!response.ok) throw new Error("Email or password is incorrect.");
        const session = await response.json();
        accessToken = session.access_token;
        sessionStorage.setItem("sunday-sessions-admin-token", accessToken);
        loginForm.reset();
        await loadSubscribers();
      } catch (error) {
        loginError.textContent = error.message || "Unable to sign in.";
      } finally {
        button.disabled = false;
      }
    });

    logoutButton.addEventListener("click", () => showLogin());
    document.querySelector("#refresh").addEventListener("click", () => {
      loadSubscribers().catch(() => { portalError.textContent = "Could not refresh subscribers."; });
    });

    if (accessToken) {
      loadSubscribers().catch(() => showLogin("Please sign in again."));
    }
  </script>
</body>
</html>
